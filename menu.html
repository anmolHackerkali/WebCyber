<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.25);
backdrop-filter:blur(15px);
}

.menu-box{

width:380px;
max-height:85vh;
overflow-y:auto;

padding:30px;

border-radius:25px;

background:
linear-gradient(
135deg,
#000000,
#001500,
#220000
);

border:2px solid #00ff66;

box-shadow:
0 0 25px #00ff66,
0 0 40px rgba(255,0,0,.5);

animation:popup .4s ease;

}

@keyframes popup{

from{
transform:scale(.5);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

.title{
text-align:center;
color:#00ff66;
font-size:28px;
font-weight:bold;
margin-bottom:20px;
text-shadow:0 0 15px #00ff66;
}

.menu-box a{

display:block;

padding:16px;

margin:10px 0;

border-radius:15px;

text-decoration:none;

color:white;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

transition:.4s;

}

.menu-box a:hover{

background:
linear-gradient(
90deg,
#00ff66,
#ff0000
);

transform:translateX(12px);

box-shadow:
0 0 15px #00ff66,
0 0 15px #ff0000;

}

.close-btn{

margin-top:20px;

width:100%;

padding:15px;

border:none;

border-radius:15px;

font-size:18px;

cursor:pointer;

background:#ff0000;

color:white;

transition:.3s;

}

.close-btn:hover{

background:#cc0000;

transform:scale(1.05);

}

::-webkit-scrollbar{
width:6px;
}

::-webkit-scrollbar-thumb{
background:#00ff66;
border-radius:10px;
}

</style>
</head>
