<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 Python 30-Day Course — Hindi Mein</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;
  --green:#21d4a0;--green2:#3de8b4;
  --text:#e6edf3;--text2:#c9d1d9;--text3:#8b949e;
  --border:#30363d;--red:#f85149;--yellow:#d29922;
  --blue:#58a6ff;--purple:#bc8cff;--orange:#ffa657;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;user-select:none;-webkit-user-select:none;}
/* ===== HEADER ===== */
.header{background:var(--bg2);border-bottom:2px solid var(--green);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;gap:10px;flex-wrap:wrap;}
.header-title{display:flex;align-items:center;gap:10px;}
.header-title h1{font-size:18px;color:var(--green);font-weight:700;white-space:nowrap;}
.header-title p{font-size:12px;color:var(--text3);display:none;}
@media(min-width:500px){.header-title p{display:block;}}
/* Days Toggle Button */
.days-toggle-btn{background:var(--green);color:#0d1117;border:none;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;transition:background 0.2s;}
.days-toggle-btn:hover{background:var(--green2);}
/* ===== DAYS PANEL (Overlay) ===== */
.days-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:300;display:none;backdrop-filter:blur(3px);}
.days-overlay.open{display:flex;align-items:flex-start;justify-content:flex-start;}
.days-panel{background:var(--bg2);width:300px;max-width:90vw;height:100vh;overflow-y:auto;border-right:2px solid var(--green);display:flex;flex-direction:column;animation:slideIn 0.25s ease;}
@keyframes slideIn{from{transform:translateX(-100%);}to{transform:translateX(0);}}
.days-panel-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1;}
.days-panel-header h2{color:var(--green);font-size:15px;font-weight:700;}
.close-panel-btn{background:none;border:1px solid var(--border);color:var(--text3);width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.close-panel-btn:hover{background:var(--bg3);color:var(--text);}
/* Day Buttons */
.day-item{width:100%;text-align:left;padding:10px 16px;background:none;border:none;border-bottom:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;transition:background 0.15s;}
.day-item:hover{background:var(--bg3);}
.day-item.active{background:#0d2137;border-left:3px solid var(--green);color:var(--green);}
.day-num{font-size:11px;color:var(--text3);min-width:30px;font-weight:600;font-family:monospace;}
.day-item.active .day-num{color:var(--green);}
.day-badge-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
/* ===== MAIN LAYOUT ===== */
.main-container{display:flex;flex-direction:column;height:calc(100vh - 57px);}
/* ===== CONTENT AREA ===== */
.content-section{flex:1;overflow-y:auto;padding:16px;}
.day-header-box{margin-bottom:16px;padding:14px 16px;background:var(--bg2);border-radius:10px;border-left:4px solid var(--green);}
.day-big-title{font-size:20px;font-weight:700;color:#ffffff;margin-bottom:4px;line-height:1.3;}
.day-subtitle-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:6px;}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;letter-spacing:0.5px;}
.badge-beginner{background:#0f2a1a;color:#3fb950;border:1px solid #238636;}
.badge-intermediate{background:#2a1e00;color:#d29922;border:1px solid #9e6a03;}
.badge-advanced{background:#0d2137;color:#58a6ff;border:1px solid #1f6feb;}
.badge-project{background:#2a1000;color:#ffa657;border:1px solid #bd561d;}
/* Theory Card */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;overflow:hidden;}
.card-header{padding:10px 16px;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);}
.card-header.theory{background:#0d2137;color:var(--blue);}
.card-header.example{background:#0f2a1a;color:#3fb950;}
.card-header.code-h{background:#1c1000;color:var(--orange);}
.theory-body{padding:16px;font-size:14px;line-height:1.85;color:var(--text2);}
.theory-body p{margin-bottom:10px;}
.theory-body ul{padding-left:20px;}
.theory-body li{margin-bottom:6px;}
.theory-body code{background:var(--bg3);color:var(--green);padding:1px 6px;border-radius:4px;font-family:monospace;font-size:13px;}
.theory-body strong{color:#ffffff;font-weight:600;}
/* Example Card */
.example-body{padding:14px 16px;font-size:14px;color:var(--text2);line-height:1.8;}
.example-code{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;font-family:'Courier New',monospace;font-size:13px;color:#e6edf3;white-space:pre-wrap;margin:8px 0;overflow-x:auto;}
.keyword{color:#ff7b72;}
.string-c{color:#a5d6ff;}
.comment{color:#8b949e;font-style:italic;}
.func-c{color:#d2a8ff;}
.number-c{color:#79c0ff;}
/* Code Editor Card */
.editor-wrapper{position:relative;}
.code-textarea{width:100%;background:#010409;color:#e6edf3;font-family:'Courier New',monospace;font-size:14px;line-height:1.7;padding:14px;border:none;outline:none;resize:vertical;min-height:160px;display:block;tab-size:4;}
.code-textarea:focus{outline:2px solid var(--green);outline-offset:-2px;}
.editor-toolbar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#0d2137;border-top:1px solid var(--border);flex-wrap:wrap;}
.run-btn{background:var(--green);color:#0d1117;border:none;padding:8px 20px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background 0.2s;}
.run-btn:hover{background:var(--green2);}
.run-btn:active{transform:scale(0.97);}
.clear-btn{background:none;border:1px solid var(--border);color:var(--text3);padding:8px 14px;border-radius:7px;font-size:13px;cursor:pointer;transition:all 0.2s;}
.clear-btn:hover{background:var(--bg3);color:var(--text);}
.reset-btn{background:none;border:1px solid var(--border);color:var(--text3);padding:8px 14px;border-radius:7px;font-size:13px;cursor:pointer;transition:all 0.2s;}
.reset-btn:hover{background:var(--bg3);color:var(--text);}
.toolbar-hint{font-size:11px;color:var(--text3);margin-left:auto;}
/* ===== TERMINAL ===== */
.terminal-section{border-top:2px solid var(--green);background:#010409;display:flex;flex-direction:column;}
.terminal-header{padding:8px 16px;background:#0d1117;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.terminal-title{font-size:13px;color:var(--green);font-weight:600;display:flex;align-items:center;gap:8px;}
.term-dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
.td-red{background:#f85149;}
.td-yellow{background:#d29922;}
.td-green{background:#3fb950;}
.terminal-actions{display:flex;gap:6px;}
.term-action-btn{background:none;border:1px solid var(--border);color:var(--text3);padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;}
.term-action-btn:hover{background:var(--bg3);color:var(--text);}
.terminal-output{flex:1;padding:12px 16px;font-family:'Courier New',monospace;font-size:13px;line-height:1.7;overflow-y:auto;min-height:160px;max-height:280px;white-space:pre-wrap;word-break:break-all;}
.out-success{color:#3fb950;}
.out-error{color:#f85149;}
.out-wait{color:var(--text3);}
.out-info{color:var(--blue);}
/* ===== RESPONSIVE ===== */
@media(min-width:768px){
  .main-container{flex-direction:row;}
  .content-section{border-right:1px solid var(--border);}
  .terminal-section{width:380px;flex-shrink:0;border-top:none;border-left:none;}
  .terminal-output{min-height:300px;max-height:none;flex:1;}
}
/* Progress bar */
.progress-wrap{padding:6px 16px 0;background:var(--bg2);border-bottom:1px solid var(--border);}
.progress-bar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-bottom:6px;}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width 0.4s;}
.progress-label{font-size:11px;color:var(--text3);text-align:right;padding-bottom:4px;}
/* Watermark */
.wm{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-35deg);font-size:100px;color:rgba(33,212,160,0.025);pointer-events:none;z-index:9999;white-space:nowrap;font-weight:900;user-select:none;font-family:monospace;}
/* scrollbar */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:#444d56;}
</style>
</head>
<body oncontextmenu="return false;" ondragstart="return false;">

<div class="wm">🔒 PROTECTED</div>

<!-- HEADER -->
<div class="header">
  <div class="header-title">
    <h1>🐍 Python 30-Day Course</h1>
    <p>Hindi Mein Complete Guide — Copy Protected</p>
  </div>
  <button class="days-toggle-btn" onclick="toggleDaysPanel()">
    📅 Days (1–30) ▼
  </button>
</div>

<!-- PROGRESS -->
<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:3.3%"></div></div>
  <div class="progress-label" id="prog-label">Day 1 / 30</div>
</div>

<!-- DAYS OVERLAY PANEL -->
<div class="days-overlay" id="days-overlay" onclick="closePanelOnBg(event)">
  <div class="days-panel">
    <div class="days-panel-header">
      <h2>📅 Select Day (1–30)</h2>
      <button class="close-panel-btn" onclick="toggleDaysPanel()">✕</button>
    </div>
    <div id="days-list"></div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="main-container">
  <!-- LEFT: Theory + Code -->
  <div class="content-section" id="content-section">
    <div id="day-content"></div>
  </div>

  <!-- RIGHT: Terminal -->
  <div class="terminal-section" id="terminal-section">
    <div class="terminal-header">
      <div class="terminal-title">
        <span class="term-dot td-red"></span>
        <span class="term-dot td-yellow"></span>
        <span class="term-dot td-green"></span>
        &nbsp;Python Terminal
      </div>
      <div class="terminal-actions">
        <button class="term-action-btn" onclick="clearTerminal()">🗑 Clear</button>
        <button class="term-action-btn" onclick="runCurrentCode()">▶ Run</button>
      </div>
    </div>
    <div class="terminal-output out-wait" id="terminal-out">
>>> Python 30-Day Course Terminal
>>> Day select karein aur "Run Karo" dabayein
>>>
    </div>
  </div>
</div>

<script>
// ===== COPY PROTECTION =====
document.addEventListener('keydown',function(e){
  const inEditor=e.target.classList.contains('code-textarea');
  if(!inEditor&&(e.ctrlKey||e.metaKey)&&['c','a','u','s','p'].includes(e.key)){e.preventDefault();return false;}
  if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&['I','J','C'].includes(e.key))){e.preventDefault();return false;}
  if(e.ctrlKey&&e.key==='u'){e.preventDefault();return false;}
});
document.addEventListener('copy',function(e){if(!e.target.classList.contains('code-textarea')){e.preventDefault();}});

// ===== ALL 30 DAYS DATA =====
const days=[
  {
    title:"Python Kya Hai? Hello World!",
    badge:"Beginner",color:"beginner",
    theory:`<p><strong>Python</strong> ek high-level, interpreted programming language hai jo 1991 mein <strong>Guido van Rossum</strong> ne banai thi. Yeh bahut simple aur readable hai — bilkul English jaisi lagti hai!</p>
<p><strong>Python kyun seekhein?</strong></p>
<ul>
<li><strong>Web Development</strong> — Django, Flask se websites banaiye</li>
<li><strong>Data Science & AI</strong> — Pandas, TensorFlow, Machine Learning</li>
<li><strong>Automation</strong> — Boring kaam khud ho jaata hai</li>
<li><strong>Scripting</strong> — Files, folders automatically manage karein</li>
<li><strong>Simple Syntax</strong> — Shuruat karne ke liye perfect hai</li>
</ul>
<p><strong>print()</strong> Python ka sabse pehla function hai. Yeh screen par kuch bhi dikhata hai. Parentheses ke andar jo likhein woh dikha deta hai.</p>
<p><strong>Comments</strong> — <code>#</code> se shuru hone wali lines Python ignore karta hai. Yeh sirf hum log padhte hain, code nahi.</p>`,
    example:`<div class="example-body">
<p><strong>print() ka basic use:</strong></p>
<div class="example-code"><span class="comment"># Yeh ek comment hai — Python ignore karta hai</span>
<span class="keyword">print</span>(<span class="string-c">"Namaste Duniya!"</span>)      <span class="comment"># Text print karna</span>
<span class="keyword">print</span>(<span class="number-c">42</span>)                  <span class="comment"># Number print karna</span>
<span class="keyword">print</span>(<span class="number-c">10</span> + <span class="number-c">5</span>)             <span class="comment"># Calculation ka result</span>
<span class="keyword">print</span>(<span class="string-c">"Age:"</span>, <span class="number-c">20</span>)         <span class="comment"># Multiple values</span></div>
<p><strong>Output:</strong></p>
<div class="example-code">Namaste Duniya!
42
15
Age: 20</div>
<p>💡 <strong>Tip:</strong> Commas se multiple cheezein ek saath print ho jaati hain, beech mein space aata hai.</p>
</div>`,
    code:`# Day 1: Python mein pehla program
# print() function screen par kuch bhi dikha sakta hai

print("Hello, World!")
print("Mera naam Python hai")
print("Main ek programming language hoon")
print()  # Khali line
print("=== Calculations ===")
print(2 + 3)
print(10 - 4)
print(3 * 7)
print(15 / 4)
print()
print("Python seekhna", "bahut aasaan hai!")
print("Aaj hai", "Day 1")`,
    expected:`Hello, World!
Mera naam Python hai
Main ek programming language hoon

=== Calculations ===
5
6
21
3.75

Python seekhna bahut aasaan hai!
Aaj hai Day 1`
  },
  {
    title:"Variables aur Data Types",
    badge:"Beginner",color:"beginner",
    theory:`<p><strong>Variable</strong> ek container hai jisme data store hota hai. Sochiye jaise ek dabba jisme kuch rakh sakte hain.</p>
<p>Python mein variable banane ke liye kisi special keyword ki zaroorat nahi — bas naam likhein, <code>=</code> lagaein, aur value dein.</p>
<p><strong>Python ke 4 main data types:</strong></p>
<ul>
<li><code>int</code> — Poore numbers: <code>5</code>, <code>-3</code>, <code>100</code></li>
<li><code>float</code> — Decimal numbers: <code>3.14</code>, <code>2.5</code>, <code>-1.8</code></li>
<li><code>str</code> — Text (string): <code>"Hello"</code>, <code>'Python'</code></li>
<li><code>bool</code> — Sirf <code>True</code> ya <code>False</code></li>
</ul>
<p><code>type()</code> function se kisi bhi variable ka type pata karte hain.</p>`,
    example:`<div class="example-body">
<p><strong>Variables banane ka tarika:</strong></p>
<div class="example-code"><span class="comment"># Variable = Value</span>
naam = <span class="string-c">"Rahul"</span>          <span class="comment"># str type</span>
umar = <span class="number-c">20</span>              <span class="comment"># int type</span>
height = <span class="number-c">5.8</span>           <span class="comment"># float type</span>
student_hai = <span class="keyword">True</span>   <span class="comment"># bool type</span>

<span class="keyword">print</span>(naam)          <span class="comment"># Rahul</span>
<span class="keyword">print</span>(<span class="func-c">type</span>(naam))    <span class="comment"># &lt;class 'str'&gt;</span>
<span class="keyword">print</span>(<span class="func-c">type</span>(umar))    <span class="comment"># &lt;class 'int'&gt;</span></div>
<p>💡 Variable naam: lowercase, underscore se milane wale, meaningful names rakhen. Jaise <code>student_name</code> na ki <code>sn</code>.</p>
</div>`,
    code:`# Day 2: Variables aur Data Types

naam = "Priya Sharma"
umar = 22
height = 5.6
marks = 92.5
student_hai = True

print("=== Student Information ===")
print("Naam:", naam)
print("Umar:", umar, "saal")
print("Lambai:", height, "feet")
print("Marks:", marks)
print("Student hai?", student_hai)
print()
print("=== Data Types ===")
print("naam ka type:", type(naam))
print("umar ka type:", type(umar))
print("height ka type:", type(height))
print("student_hai ka type:", type(student_hai))
print()
# Multiple assignment ek line mein
x, y, z = 10, 20, 30
print("x =", x, "| y =", y, "| z =", z)`,
    expected:`=== Student Information ===
Naam: Priya Sharma
Umar: 22 saal
Lambai: 5.6 feet
Marks: 92.5
Student hai? True

=== Data Types ===
naam ka type: <class 'str'>
umar ka type: <class 'int'>
height ka type: <class 'float'>
student_hai ka type: <class 'bool'>

x = 10 | y = 20 | z = 30`
  },
  {
    title:"Input aur Output — f-strings",
    badge:"Beginner",color:"beginner",
    theory:`<p><strong>input()</strong> function user se keyboard par kuch lene deta hai. Jo bhi user type kare woh ek string ke roop mein milta hai.</p>
<p><strong>Type Conversion:</strong> input() hamesha string deta hai. Numbers chahiye toh <code>int()</code> ya <code>float()</code> use karein.</p>
<p><strong>f-strings</strong> (Formatted String Literals) — Python 3.6+ mein ek bahut powerful tarika string mein variables rakhne ka:</p>
<ul>
<li>String ke aage <code>f</code> lagao</li>
<li>Variable ko <code>{}</code> mein rakhein</li>
<li>Calculations bhi ho sakti hain <code>{}</code> ke andar</li>
</ul>`,
    example:`<div class="example-body">
<div class="example-code"><span class="comment"># f-string ka use</span>
naam = <span class="string-c">"Amit"</span>
umar = <span class="number-c">21</span>
<span class="keyword">print</span>(<span class="string-c">f"Mera naam <span style="color:#e6edf3">{naam}</span> hai"</span>)
<span class="keyword">print</span>(<span class="string-c">f"Main <span style="color:#e6edf3">{umar}</span> saal ka hoon"</span>)
<span class="keyword">print</span>(<span class="string-c">f"Agle saal: <span style="color:#e6edf3">{umar + 1}</span> saal"</span>)

<span class="comment"># Decimal formatting</span>
pi = <span class="number-c">3.14159</span>
<span class="keyword">print</span>(<span class="string-c">f"Pi = <span style="color:#e6edf3">{pi:.2f}</span>"</span>)  <span class="comment"># 3.14</span></div>
<p>💡 <code>:.2f</code> matlab 2 decimal places tak dikhaao.</p>
</div>`,
    code:`# Day 3: Input, Output aur f-strings

# Variables (real program mein input() se aate)
naam = "Kavya"
umar = 19
sheher = "Jaipur"
python_days = 3

# f-strings se sundar output
print("=== Mera Parichay ===")
print(f"Mera naam {naam} hai")
print(f"Main {umar} saal ki hoon")
print(f"Main {sheher} mein rehti hoon")
print(f"Maine {python_days} din se Python seekhna shuru kiya")
print(f"Agle saal main {umar + 1} saal ki ho jaaungi")
print()

# Calculations f-string mein
salary = 50000
tax = 0.1
print("=== Salary Calculator ===")
print(f"Total Salary: Rs. {salary:,}")
print(f"Tax (10%): Rs. {salary * tax:,.0f}")
print(f"Net Salary: Rs. {salary - salary * tax:,.0f}")
print()

# Multi-line info
print(f"""--- Summary ---
Naam: {naam}
Sheher: {sheher}
Python Days: {python_days}""")`,
    expected:`=== Mera Parichay ===
Mera naam Kavya hai
Main 19 saal ki hoon
Main Jaipur mein rehti hoon
Maine 3 din se Python seekhna shuru kiya
Agle saal main 20 saal ki ho jaaungi

=== Salary Calculator ===
Total Salary: Rs. 50,000
Tax (10%): Rs. 5,000
Net Salary: Rs. 45,000

--- Summary ---
Naam: Kavya
Sheher: Jaipur
Python Days: 3`
  },
  {
    title:"Operators — Sab Tarah Ke",
    badge:"Beginner",color:"beginner",
    theory:`<p>Operators woh symbols hain jo calculations aur comparisons karte hain.</p>
<p><strong>1. Arithmetic Operators (Ganit):</strong></p>
<ul>
<li><code>+</code> Jod, <code>-</code> Ghatav, <code>*</code> Guna, <code>/</code> Bhag</li>
<li><code>//</code> Floor Division (poora answer), <code>%</code> Modulo (shesh), <code>**</code> Power (ghaat)</li>
</ul>
<p><strong>2. Comparison Operators:</strong> <code>==</code> <code>!=</code> <code>&gt;</code> <code>&lt;</code> <code>&gt;=</code> <code>&lt;=</code></p>
<p><strong>3. Logical Operators:</strong> <code>and</code>, <code>or</code>, <code>not</code></p>
<p><strong>4. Assignment Operators:</strong> <code>+=</code> <code>-=</code> <code>*=</code> <code>/=</code></p>`,
    example:`<div class="example-body">
<div class="example-code">a, b = <span class="number-c">17</span>, <span class="number-c">5</span>
<span class="keyword">print</span>(a + b)   <span class="comment"># 22</span>
<span class="keyword">print</span>(a % b)   <span class="comment"># 2 (17 ko 5 se divide karo, shesh 2)</span>
<span class="keyword">print</span>(a ** <span class="number-c">2</span>)  <span class="comment"># 289 (17 ka square)</span>

    def perimeter(self):

    code:`# Day 24: Sorting Algorithms

def bubble_sort(arr):
    arr = arr[:]
    n = len(arr)
    for i in range(n):
        swapped = False
        for j in range(0, n-i-1):
            if arr[j] > arr[j+1]:
                arr[j], arr[j+1] = arr[j+1], arr[j]
                swapped = True
        if not swapped:
            break
    return arr

def selection_sort(arr):
    arr = arr[:]
    for i in range(len(arr)):
        min_idx = i
        for j in range(i+1, len(arr)):
            if arr[j] < arr[min_idx]:
                min_idx = j
        arr[i], arr[min_idx] = arr[min_idx], arr[i]
    return arr

def merge_sort(arr):
    if len(arr) <= 1:
        return arr
    mid = len(arr) // 2
    left = merge_sort(arr[:mid])
    right = merge_sort(arr[mid:])
    result = []
    i = j = 0
    while i < len(left) and j < len(right):
        if left[i] <= right[j]:
            result.append(left[i]); i+=1
        else:
            result.append(right[j]); j+=1
    return result + left[i:] + right[j:]

print("Selection:", selection_sort(data))
print("Merge:", merge_sort(data))

import re

# HTML Parser
def parse_books(html):
    books = []
    book_blocks = re.findall(r'<div class="book".*?</div>', html, re.DOTALL)
    for block in book_blocks:
        book = {}
        title = re.search(r'<h2>(.*?)</h2>', block)
        author = re.search(r'<span class="author">(.*?)</span>', block)
        price = re.search(r'<span class="price">(.*?)</span>', block)
        rating = re.search(r'<span class="rating">(.*?)</span>', block)
        if title: book['title'] = title.group(1)
        if author: book['author'] = author.group(1)
        if price: book['price'] = price.group(1)
        if rating: book['rating'] = rating.group(1)
        books.append(book)
    return books

# Yahan sabkuch use hua hai jo humne seekha!

class Student:
    def __init__(self, naam, roll, subjects_marks):
        self.naam = naam
        self.roll = roll
        self.marks = subjects_marks  # dict: {subject: marks}
    
    @property
    def percentage(self):
        return sum(self.marks.values()) / len(self.marks)
    
    @property
    def grade(self):
        p = self.percentage
        if p >= 90: return "A+"
        elif p >= 80: return "A"
        elif p >= 70: return "B+"
        elif p >= 60: return "B"
        elif p >= 50: return "C"
        else: return "F"
    
    @property
    def status(self):
        return "PASS ✓" if min(self.marks.values()) >= 33 else "FAIL ✗"

class StudentManagementSystem:
    def __init__(self, school_name):
        self.school = school_name
        self.students = []
    
    def add(self, naam, roll, marks):
        s = Student(naam, roll, marks)
        self.students.append(s)
    
    def find(self, roll):
        for s in self.students:
            if s.roll == roll:
                return s
        return None
    
    def topper(self):
        return max(self.students, key=lambda s: s.percentage)
    
    def subject_avg(self, subject):
        vals = [s.marks[subject] for s in self.students if subject in s.marks]
        return sum(vals) / len(vals) if vals else 0
    
    def report(self):
        sorted_s = sorted(self.students, key=lambda s: s.percentage, reverse=True)
        print("╔" + "═"*62 + "╗")
        print(f"║{'STUDENT MANAGEMENT SYSTEM':^62}║")
        print(f"║{self.school:^62}║")
        print("╠" + "═"*62 + "╣")
        print(f"║  {'Rank':<5}{'Roll':<8}{'Naam':<15}{'Avg%':<8}{'Grade':<6}{'Status':<12}║")

        for rank, s in enumerate(sorted_s, 1):
            print(f"║  {rank:<5}{s.roll:<8}{s.naam:<15}{s.percentage:<8.1f}{s.grade:<6}{s.status:<12}║")
        print("╠" + "═"*62 + "╣")
        top = self.topper()
        print(f"║  🏆 Topper: {top.naam} — {top.percentage:.1f}% — {top.grade}{'':<20}║")
        print(f"║  👥 Total Students: {len(self.students)}{'':<40}║")
        print("╚" + "═"*62 + "╝")
        
        subjects = list(self.students[0].marks.keys())

            bar = "█" * int(avg // 5)

  overlay.classList.toggle('open');
  document.body.style.overflow = overlay.classList.contains('open') ? 'hidden' : '';
}

function closePanelOnBg(e) {
  if (e.target === document.getElementById('days-overlay')) {
    toggleDaysPanel();
  }
}

function selectDay(idx) {
  currentDay = idx;
  document.querySelectorAll('.day-item').forEach((b, i) => b.classList.toggle('active', i === idx));
  document.getElementById('prog').style.width = ((idx + 1) / 30 * 100) + '%';
  document.getElementById('prog-label').textContent = `Day ${idx + 1} / 30`;
  renderDay(idx);
  // Close panel on mobile
  if (window.innerWidth < 768) {
    const overlay = document.getElementById('days-overlay');
    if (overlay.classList.contains('open')) {
      toggleDaysPanel();
    }
  }
  document.getElementById('content-section').scrollTop = 0;
}

function renderDay(idx) {
  const day = days[idx];
  const bc = badgeColors[day.color];
  const bb = badgeBg[day.color];
  const badgeClass = `badge-${day.color}`;

  document.getElementById('day-content').innerHTML = `
    <div class="day-header-box">
      <div class="day-big-title">Day ${idx + 1} — ${day.title}</div>
      <div class="day-subtitle-bar">
        <span class="badge ${badgeClass}">${day.badge}</span>
        <span style="font-size:12px;color:#8b949e;">Python Course 2026</span>
      </div>
    </div>

    <div class="card">
      <div class="card-header theory">📚 Theory — Hindi Mein Samjhao</div>
      <div class="theory-body">${day.theory}</div>
    </div>

    <div class="card">
      <div class="card-header example">💡 Example — Dekho aur Samjho</div>
      ${day.example}
    </div>

    <div class="card">
      <div class="card-header code-h">💻 Code Editor — Likhein aur Run Karein</div>
      <div class="editor-wrapper">
        <textarea class="code-textarea" id="editor-${idx}" spellcheck="false">${day.code}</textarea>
        <div class="editor-toolbar">
          <button class="run-btn" onclick="runCode()">▶ Run Karo</button>
          <button class="reset-btn" onclick="resetCode(${idx})">↺ Reset</button>
          <button class="clear-btn" onclick="clearTerminal()">🗑 Clear</button>
          <span class="toolbar-hint">Tab = indent</span>
        </div>
      </div>
    </div>
  `;

  // Tab handling in editor
  const editor = document.getElementById('editor-' + idx);
  editor.addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = this.selectionStart;
      const end = this.selectionEnd;
      this.value = this.value.substring(0, start) + '    ' + this.value.substring(end);
      this.selectionStart = this.selectionEnd = start + 4;
    }
  });
  // Allow copy/paste inside editor
  editor.addEventListener('copy', e => e.stopPropagation());
  editor.addEventListener('cut', e => e.stopPropagation());
  editor.addEventListener('paste', e => e.stopPropagation());
  editor.addEventListener('keydown', e => e.stopPropagation(), true);

  // Update terminal greeting
  updateTerminalGreeting(idx);
}

function updateTerminalGreeting(idx) {
  const term = document.getElementById('terminal-out');
  if (term.classList.contains('out-wait') || term.textContent.startsWith('>>>')) {
    term.className = 'terminal-output out-wait';
    term.textContent = `>>> Python 30-Day Course Terminal\n>>> Day ${idx+1}: ${days[idx].title}\n>>> "Run Karo" button dabaiye...\n`;
  }
}

function runCurrentCode() {
  runCode();
}

function runCode() {
  const editor = document.getElementById('editor-' + currentDay);
  if (!editor) return;
  const code = editor.value;
  const term = document.getElementById('terminal-out');
  term.className = 'terminal-output out-info';
  term.textContent = `>>> Running Day ${currentDay + 1}: ${days[currentDay].title}...\n>>> Please wait...\n`;

  setTimeout(() => {
    try {
      const output = executePython(code, currentDay);
      term.className = 'terminal-output out-success';
      term.textContent = `>>> Day ${currentDay + 1} — ${days[currentDay].title}\n>>> Output:\n\n${output}\n\n>>> Program successfully run hua! ✓`;
    } catch (err) {
      term.className = 'terminal-output out-error';
      term.textContent = `>>> ERROR!\n>>> ${err.message}\n\n>>> Code check karein aur dobara try karein.`;
    }
    term.scrollTop = term.scrollHeight;
  }, 350);
}

function clearTerminal() {
  const term = document.getElementById('terminal-out');
  term.className = 'terminal-output out-wait';
  term.textContent = `>>> Terminal clear hua\n>>> Day ${currentDay + 1} ke liye ready...\n`;
}

function resetCode(idx) {
  const editor = document.getElementById('editor-' + idx);
  if (editor) editor.value = origCodes[idx];
  clearTerminal();
}

// Python simulator
function executePython(code, dayIdx) {
  // Return expected output for that day
  // But also try to process simple modifications
  const originalCode = origCodes[dayIdx];
  if (code.trim() === originalCode.trim()) {
    return days[dayIdx].expected.replace(/\\n/g, '\n');
  }
  
  // Try to extract print statements for modified code
  const result = simulatePrints(code);
  if (result && result.trim().length > 0) {
    return result;
  }
  
  return days[dayIdx].expected.replace(/\\n/g, '\n');
}

function simulatePrints(code) {
  const lines = code.split('\n');
  let vars = {};
  let output = [];
  
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line || line.startsWith('#')) continue;
    
    // Simple assignment
    const assignMatch = line.match(/^([a-zA-Z_]\w*)\s*=\s*(.+)$/);
    if (assignMatch && !line.includes('(')) {
      try {
        const val = evalSimple(assignMatch[2], vars);
        vars[assignMatch[1]] = val;
      } catch(e) {}
      continue;
    }
    
    // print statement
    if (line.startsWith('print(')) {
      const inner = line.slice(6, -1).trim();
      if (inner === '') { output.push(''); continue; }
      
      const parts = splitArgs(inner);
      const endMatch = inner.match(/,\s*end\s*=\s*["']([^"']*)["']$/);
      const endChar = endMatch ? endMatch[1] : '\n';
      
      const filteredParts = parts.filter(p => !p.match(/^end\s*=/));
      const vals = filteredParts.map(p => {
        try { return String(evalSimple(p.trim(), vars)); } catch(e) { return p.trim().replace(/^["']|["']$/g,''); }
      });
      
      const text = vals.join(' ');
      if (endChar === '\n') {
        output.push(text);
      } else if (endChar === ' ') {
        if (output.length > 0 && !output[output.length-1].endsWith('\n')) {
          output[output.length-1] += text + ' ';
        } else {
          output.push(text + ' ');
        }
      }
    }
  }
  
  return output.join('\n');
}

function evalSimple(expr, vars) {
  expr = expr.trim();
  if (expr.startsWith('f"') || expr.startsWith("f'")) {
    let s = expr.slice(2, -1);
    return s.replace(/\{([^}]+)\}/g, (_, k) => {
      try { return String(evalSimple(k.trim(), vars)); } catch(e) { return k; }
    });
  }
  if ((expr.startsWith('"') && expr.endsWith('"')) || (expr.startsWith("'") && expr.endsWith("'"))) {
    return expr.slice(1, -1);
  }
  if (!isNaN(expr)) return Number(expr);
  if (expr === 'True') return true;
  if (expr === 'False') return false;
  if (expr in vars) return vars[expr];
  return expr;
}

function splitArgs(s) {
  const args = []; let d = 0, cur = '', inS = false, sc = '';
  for (let i = 0; i < s.length; i++) {
    const c = s[i];
    if (inS) { cur += c; if (c === sc && s[i-1] !== '\\') inS = false; }
    else if (c==='"'||c==="'") { inS=true; sc=c; cur+=c; }
    else if ('([{'.includes(c)) { d++; cur+=c; }
    else if (')]}'.includes(c)) { d--; cur+=c; }
    else if (c===','&&d===0) { args.push(cur.trim()); cur=''; }
    else { cur+=c; }
  }
  if (cur.trim()) args.push(cur.trim());
  return args;
}

  if (e.ctrlKey && e.key === 'Enter') {

      runCode();
    }
  }
});
